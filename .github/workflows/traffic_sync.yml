name: NagarIQ Data Sync

on:
  schedule:
    - cron: '*/7 * * * *' # Run every 7 minutes
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync-all-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx python-dotenv

      - name: Fetch Live Traffic Data
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          python backend/scripts/fetch_live_traffic.py

      - name: Fetch Bus Data
        run: |
          python backend/scripts/fetch_bus_data.py

      - name: Fetch Metro Data
        run: |
          python backend/scripts/fetch_metro_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/live_traffic.json
          git add frontend/public/data/bus_data.json
          git add frontend/public/data/metro_data.json
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Auto-sync all city data [skip ci]" && git pull --rebase origin main && git push origin main)
